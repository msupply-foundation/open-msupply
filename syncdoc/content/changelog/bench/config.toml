# Changelog Insert Performance Benchmark Configuration

# Global settings
batch_size = 10_000          # inserts to measure per (scenario, N) pair
port = 15432
pg_image = "postgres:17"
output_dir = "results"
seed_dir = "seeds"

# Table sizes to test
n_values = [1_000_000, 10_000_000, 100_000_000]

# ── Phase 1: PG Config comparison (same indexes = "v7", no partitioning) ──
# Goal: isolate the impact of Postgres configuration on insert performance

[[scenarios]]
name = "v7_default"
phase = 1
pg_config_file = "pg-configs/default.txt"
indexes = "v7"

[[scenarios]]
name = "v7_moderate"
phase = 1
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"

[[scenarios]]
name = "v7_write_optimised"
phase = 1
pg_config_file = "pg-configs/write-optimised.txt"
indexes = "v7"

# ── Phase 2: Index strategy comparison (same PG config = moderate, no partitioning) ──
# Goal: isolate the impact of indexes on insert performance

[[scenarios]]
name = "idx_pk_only"
phase = 2
pg_config_file = "pg-configs/moderate.txt"
indexes = "pk_only"

[[scenarios]]
name = "idx_v7"
phase = 2
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"

# ── Phase 3: Partition strategy comparison (same PG config = moderate, same indexes = v7) ──
# Goal: isolate the impact of different partitioning strategies on insert performance

[[scenarios]]
name = "no_partition"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"

[[scenarios]]
name = "range_cursor_100k"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"
[scenarios.partition]
strategy = "range"
key = "cursor"
size = 100_000

[[scenarios]]
name = "range_cursor_1m"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"
[scenarios.partition]
strategy = "range"
key = "cursor"
size = 1_000_000

[[scenarios]]
name = "range_cursor_10m"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"
[scenarios.partition]
strategy = "range"
key = "cursor"
size = 10_000_000

[[scenarios]]
name = "hash_cursor_16"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"
[scenarios.partition]
strategy = "hash"
key = "cursor"
count = 16

[[scenarios]]
name = "hash_cursor_64"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"
[scenarios.partition]
strategy = "hash"
key = "cursor"
count = 64

[[scenarios]]
name = "list_table_name"
phase = 3
pg_config_file = "pg-configs/moderate.txt"
indexes = "v7"
[scenarios.partition]
strategy = "list"
key = "table_name"
