[package]
name = "changelog-bench"
version = "0.1.0"
edition = "2021"

[features]
sqlite = []

[dependencies]
diesel = { version = "2.3.7", features = ["postgres"] }
clap = { version = "4", features = ["derive"] }
plotters = "0.3"
rand = "0.10"
anyhow = "1"
toml = "1.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
urlencoding = "2"
md-5 = "0.10"
sys-info = "0.9.1"
