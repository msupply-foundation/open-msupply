apply plugin: 'com.android.application'
import groovy.json.JsonSlurper

def getVersionFromPackageJson() {
   def inputFile = new File("$rootDir/../../../package.json")
   def packageJson = new JsonSlurper().parseText(inputFile.text)

   return packageJson["version"]
}

def getVersionCodeFromVersionName(versionName) {
    // trimmed version = version without candidate (only consider first part of version, before any `-`)
    def (trimmedVersion) = versionName.tokenize('-')
    def (major, minor, patch) = trimmedVersion.tokenize('.')
    return (major.toInteger() * 1000000) + (minor.toInteger() * 10000) + (patch.toInteger() * 100)
}


android {
    namespace = "org.openmsupply.client"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "org.openmsupply.client"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Get version from package.json in the repo root
        versionName getVersionFromPackageJson() 
        versionCode getVersionCodeFromVersionName(versionName)
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        setProperty("archivesBaseName", "open-msupply-$versionName")

        project.logger.lifecycle("versionName: $versionName versionCode: $versionCode")
    }
    signingConfigs {
        release {
            // Check for release and if in release mode try to load signing info
            if (project.gradle.startParameter.taskNames.any { it.toLowerCase().contains('release') }) {
                def Properties localProps = new Properties()
                localProps.load(new FileInputStream(file('../local.properties')))

                if (localProps['storeFile'] == null || localProps['keyAlias'] == null || localProps['keyAlias'] == null || localProps['keyAlias'] == null) {
                    throw new Exception('Signing info missing in local.properties')
                }

                storeFile file(localProps['storeFile'])
                keyAlias localProps['keyAlias']
                storePassword localProps['storePassword']
                keyPassword localProps['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    flavorDimensions "abi"
    productFlavors {
        arm64 {
            dimension "abi"
            versionNameSuffix "-arm64"
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        universal {
            dimension "abi"
            versionNameSuffix "-universal"
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a"
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    // rustls-platform-verifier needs a small Kotlin component bundled with the app.
    // The AAR is shipped inside the rustls-platform-verifier-android crate; locate it
    // via `cargo metadata` so it stays in sync with the Rust dependency version.
    maven {
        url = findRustlsPlatformVerifierProject()
        metadataSources.artifact()
    }
}

String findRustlsPlatformVerifierProject() {
    // Android Studio's Gradle process doesn't inherit the shell PATH, so resolve cargo
    // explicitly from CARGO_HOME (defaults to ~/.cargo) or fall back to a `which`-style lookup.
    def cargoHome = System.getenv("CARGO_HOME") ?: "${System.getProperty('user.home')}/.cargo"
    def cargoBin = "$cargoHome/bin/cargo"
    if (!file(cargoBin).exists()) {
        cargoBin = "cargo"
    }

    def dependencyText = providers.exec {
        commandLine(cargoBin, "metadata", "--format-version", "1", "--filter-platform", "aarch64-linux-android", "--manifest-path", "$rootDir/../../../server/android/Cargo.toml")
    }.standardOutput.asText.get()

    def dependencyJson = new JsonSlurper().parseText(dependencyText)
    def manifestPath = file(dependencyJson.packages.find { it.name == "rustls-platform-verifier-android" }.manifest_path)
    return new File(manifestPath.parentFile, "maven").path
}

// Exclude the unbundled Play Services barcode scanning dependency
// to avoid conflicts with the bundled version
configurations.all {
    exclude group: 'com.google.android.gms', module: 'play-services-mlkit-barcode-scanning'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation(name: 'HoneywellScanner', ext: 'aar')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.android.gms:play-services-location:$playServicesLocationVersion"
    
    // Use bundled MLKit barcode scanning instead of unbundled Play Services version
    // This bundles the model with the app, avoiding runtime downloads
    implementation 'com.google.mlkit:barcode-scanning:17.3.0'

    // Companion Kotlin classes for rustls-platform-verifier — required for outbound HTTPS
    // (sync to the central server). Without this the verifier fails with
    // "failed to call native verifier".
    implementation 'rustls:rustls-platform-verifier:latest.release'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
