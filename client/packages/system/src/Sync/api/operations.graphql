fragment SyncSettings on SyncSettingsNode {
  __typename
  intervalSeconds
  url
  username
  centralServerSiteId
  syncSiteId
}

query syncSettings {
  syncSettings {
    ...SyncSettings
  }
}

fragment SyncError on SyncErrorNode {
  __typename
  variant
  fullError
}

mutation initialiseSite($syncSettings: SyncSettingsInput!) {
  initialiseSite(input: $syncSettings) {
    __typename
    ... on SyncSettingsNode {
      ...SyncSettings
    }
    ... on SyncErrorNode {
      ...SyncError
    }
  }
}

mutation updateSyncSettings($syncSettings: SyncSettingsInput!) {
  updateSyncSettings(input: $syncSettings) {
    __typename
    ... on SyncSettingsNode {
      ...SyncSettings
    }
    ... on SyncErrorNode {
      ...SyncError
    }
  }
}

fragment SyncStatus on SyncStatusNode {
  __typename
  finished
  durationInSeconds
  started
}

fragment SyncStatusWithProgress on SyncStatusWithProgressNode {
  __typename
  finished
  started
  done
  total
}

fragment FullSyncStatus on FullSyncStatusNode {
  __typename
  error {
    ...SyncError
  }
  integration {
    ...SyncStatusWithProgress
  }
  isSyncing
  prepareInitial {
    ...SyncStatus
  }
  pullCentral {
    ...SyncStatusWithProgress
  }
  pullRemote {
    ...SyncStatusWithProgress
  }
  push {
    ...SyncStatusWithProgress
  }
  pullV6 {
    ...SyncStatusWithProgress
  }
  pushV6 {
    ...SyncStatusWithProgress
  }
  summary {
    ...SyncStatus
  }
  lastSuccessfulSync {
    ...SyncStatus
  }
  errorThreshold
  warningThreshold
}

query syncInfo {
  syncStatus: latestSyncStatus {
    ...FullSyncStatus
  }
  numberOfRecordsInPushQueue
}

query syncStatus {
  syncStatus: latestSyncStatus {
    ...FullSyncStatus
  }
}

mutation manualSync($fetchPatientId: String) {
  manualSync(fetchPatientId: $fetchPatientId)
}

subscription syncInfoUpdated {
  syncInfoUpdated {
    syncStatus {
      ...FullSyncStatus
    }
    numberOfRecordsInPushQueue
  }
}

fragment SyncErrorV7 on SyncErrorV7Node {
  __typename
  variant
  fullError
}

fragment SyncStatusV7 on SyncStatusV7Node {
  __typename
  finished
  durationInSeconds
  started
}

fragment SyncStatusWithProgressV7 on SyncStatusWithProgressV7Node {
  __typename
  finished
  started
  done
  total
}

fragment FullSyncStatusV7 on FullSyncStatusV7Node {
  __typename
  isSyncing
  error {
    ...SyncErrorV7
  }
  summary {
    ...SyncStatusV7
  }
  push {
    ...SyncStatusWithProgressV7
  }
  waitingForIntegration {
    ...SyncStatusV7
  }
  pull {
    ...SyncStatusWithProgressV7
  }
  integration {
    ...SyncStatusWithProgressV7
  }
  lastSuccessfulSync {
    ...SyncStatusV7
  }
  errorThreshold
  warningThreshold
}

query syncInfoV7 {
  syncStatus: latestSyncStatusV7 {
    ...FullSyncStatusV7
  }
  numberOfRecordsInPushQueue
}

query syncStatusV7 {
  syncStatus: latestSyncStatusV7 {
    ...FullSyncStatusV7
  }
}

subscription syncInfoV7Updated {
  syncInfoV7Updated {
    syncStatus {
      ...FullSyncStatusV7
    }
    numberOfRecordsInPushQueue
  }
}
