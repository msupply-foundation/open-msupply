fragment SiteRow on SiteNode {
  __typename
  id
  code
  name
  hardwareId
}

fragment SiteStoreRow on StoreNode {
  __typename
  id
  code
  storeName
  siteId
}

query sites(
  $sort: [SiteSortInput!]
  $first: Int
  $offset: Int
  $filter: SiteFilterInput
) {
  centralServer {
    site {
      sites(
        sort: $sort
        page: { first: $first, offset: $offset }
        filter: $filter
      ) {
        ... on SiteConnector {
          __typename
          totalCount
          nodes {
            __typename
            ...SiteRow
          }
        }
      }
    }
  }
}

mutation upsertSite($input: UpsertSiteInput!) {
  centralServer {
    site {
      upsertSite(input: $input) {
        __typename
        ... on SiteNode {
          ...SiteRow
        }
        ... on UpsertSiteError {
          __typename
          error {
            ... on CodeRequired {
              __typename
              description
            }
            ... on NameRequired {
              __typename
              description
            }
            ... on PasswordRequired {
              __typename
              description
            }
            description
          }
        }
      }
    }
  }
}

mutation deleteSite($siteId: Int!) {
  centralServer {
    site {
      deleteSite(siteId: $siteId) {
        id
      }
    }
  }
}

mutation assignStoresToSite($input: AssignStoresToSiteInput!) {
  centralServer {
    site {
      assignStoresToSite(input: $input) {
        siteId
        storeIds
      }
    }
  }
}

query storesBySite($siteId: Int!) {
  stores(filter: { siteId: { equalTo: $siteId } }, page: { first: 1000 }) {
    ... on StoreConnector {
      __typename
      totalCount
      nodes {
        ...SiteStoreRow
      }
    }
  }
}
