<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 0; background: #fff; }
      #root:empty::after {
        content: '';
        display: block;
        width: 40px; height: 40px;
        margin: 45vh auto 0;
        border: 3px solid #e0e0e0;
        border-top-color: #e95c30;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
