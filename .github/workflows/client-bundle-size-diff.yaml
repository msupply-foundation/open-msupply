name: Bundle size diff - Build

on:
  pull_request:
    paths:
      - "client/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-base:
    name: Build base
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v1
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Install dependencies
        run: cd ./client && rm -rf node_modules && yarn install --frozen-lockfile

      - name: Build
        run: cd ./client && yarn build-stats

      - name: Upload base stats.json
        uses: actions/upload-artifact@v4
        with:
          name: base
          path: ./client/packages/host/dist/stats.json
          retention-days: 3

  build-pr:
    name: Build PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v1
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Install dependencies
        run: cd ./client && rm -rf node_modules && yarn install --frozen-lockfile

      - name: Build
        run: cd ./client && yarn build-stats

      - name: Upload PR stats.json
        uses: actions/upload-artifact@v4
        with:
          name: pr-stats
          path: ./client/packages/host/dist/stats.json
          retention-days: 3

  compare:
    name: Compare bundle sizes
    needs: [build-base, build-pr]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Download base stats
        uses: actions/download-artifact@v4
        with:
          name: base
          path: base

      - name: Download PR stats
        uses: actions/download-artifact@v4
        with:
          name: pr-stats
          path: pr

      - name: Calculate diff
        id: get-diff
        uses: NejcZdovc/bundle-size-diff@v1
        with:
          base_path: "./base/stats.json"
          pr_path: "./pr/stats.json"

      - name: Save comparison data
        run: |
          echo "${{ github.event.pull_request.number }}" > pr_number
          cat > result.txt << 'EOF'
          📊 **Bundle Size Comparison**
          
          | Metric | Value |
          |--------|-------|
          | Base Size | ${{ steps.get-diff.outputs.base_file_string }} |
          | PR Size | ${{ steps.get-diff.outputs.pr_file_string }} |
          | Difference | ${{ steps.get-diff.outputs.diff_file_string }} |
          | Change | ${{ steps.get-diff.outputs.percent }}% |
          EOF

      - name: Upload comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-artifact
          path: |
            pr_number
            result.txt
          retention-days: 3
