name: Bundle size diff - Build

on:
  pull_request:
    paths:
      - 'client/**'
  merge_group:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-base:
    name: Build base
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v1
        with:
          node-version: '${{ steps.nvm.outputs.NVMRC }}'

      # Install/Build tolerate failure so a broken base branch doesn't fail
      # the PR check. The compare job detects the missing artifact and posts
      # a warning comment instead of a diff.
      - name: Install dependencies
        id: install
        continue-on-error: true
        run: corepack enable && cd ./client && yarn install --immutable

      - name: Build
        id: build
        if: ${{ steps.install.outcome == 'success' }}
        continue-on-error: true
        run: cd ./client && yarn build-stats

      - name: Upload base stats.json
        if: ${{ steps.build.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: base
          path: ./client/packages/host/dist/stats.json
          retention-days: 3

  build-pr:
    name: Build PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v1
        with:
          node-version: '${{ steps.nvm.outputs.NVMRC }}'

      - name: Install dependencies
        run: corepack enable && cd ./client && yarn install --immutable

      - name: Build
        run: cd ./client && yarn build-stats

      - name: Upload PR stats.json
        uses: actions/upload-artifact@v4
        with:
          name: pr-stats
          path: ./client/packages/host/dist/stats.json
          retention-days: 3

  compare:
    name: Compare bundle sizes
    needs: [build-base, build-pr]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Download base stats
        id: download-base
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: base
          path: base

      - name: Download PR stats
        uses: actions/download-artifact@v4
        with:
          name: pr-stats
          path: pr

      - name: Calculate diff
        if: ${{ steps.download-base.outcome == 'success' }}
        id: get-diff
        uses: NejcZdovc/bundle-size-diff@v1
        with:
          base_path: './base/stats.json'
          pr_path: './pr/stats.json'

      - name: Save comparison data
        run: |
          echo "${{ github.event.pull_request.number }}" > pr_number
          if [ "${{ steps.download-base.outcome }}" = "success" ]; then
            cat > result.txt << 'EOF'
          ## Bundle size difference
          Comparing this PR to `main`

          |Old size      | New size     | Diff                     |
          |:------------ |:-------------|:-------------------------|
          |${{ steps.get-diff.outputs.base_file_string }}         |${{ steps.get-diff.outputs.pr_file_string }}         | ${{ steps.get-diff.outputs.diff_file_string }} (${{ steps.get-diff.outputs.percent }}%) |
          EOF
          else
            cat > result.txt << 'EOF'
          ## Bundle size difference

          ⚠️ Unable to run bundle size diff check due to failing base branch build.
          EOF
          fi

      - name: Upload comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-artifact
          path: |
            pr_number
            result.txt
          retention-days: 3
