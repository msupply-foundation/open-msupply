name: Sync labels and link PRs to issues
on:
  pull_request_target:
    types: [opened, reopened, edited]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync labels and link to issue
        uses: actions/github-script@v7
        with:
          script: |
            core.debug(`where the PR? ${context.repo.repo} ${context.repo.owner} ${context.issue.number}`);
            let x = 1
            const pullRequestResult = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(name: $repo, owner: $owner) {
                  pullRequest(number: $number) {
                    id
                    body
                    labels (first: 100){
                      nodes {
                        id
                      }
                    }
                    closingIssuesReferences(first: 1) {
                      nodes {
                        number
                        labels(first: 100) {
                          nodes {
                            id
                          }
                        }
                        milestone {
                          id
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.issue.number
            })

            core.debug(pullRequestResult)

            const pullRequest = pullRequestResult.repository.pullRequest

            let issue = pullRequest.closingIssuesReferences.nodes[0]
            let issueNumber = issue?.number

            if (!issue) {
              const regex = new RegExp(/#(\d+)/);
              const match = pullRequest.body.match(regex)
              issueNumber = match ? Number(match[1]) : null

              if  (!issueNumber) {
                throw new Error('No associated issue found for this pull request. Not even in the body!')
              }

              const issueResult = await github.graphql(`
                query ($repo: String!, $owner: String!, $number: Int!) {
                  repository(name: $repo, owner: $owner) {
                    issue(number: $number) {
                      labels(first: 100) {
                        nodes {
                          id
                        }
                      }
                      milestone {
                        id
                      }
                    }
                  }
                }
              `, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: issueNumber
              })

              core.debug(issueResult)
              issue = issueResult.repository.issue

              if (!issue) {
                throw new Error('No associated issue found for this pull request. There was a match in the description, but not to an issue: ${issueNumber}')
              }
            }

            core.debug(issue)

            core.debug(x++)
            const pullRequestId = pullRequest.id
            core.debug(x++)
            const pullRequestLabelIds = pullRequest.labels.nodes.map(label => label.id)
            core.debug(x++)
            const issueLabelIds = issue.labels.nodes.map(label => label.id)
            core.debug(x++)
            const labelIds = issueLabelIds.concat(pullRequestLabelIds)
            core.debug(x++)
            const milestoneId = issue.milestone && issue.milestone.id // Linked issue might not have a milestone
            core.debug(x++)

            const mutationResult = await github.graphql(`
              mutation($labelIds: [ID!] = "", $pullRequestId: ID!, $milestoneId: ID = "") {
                updatePullRequest(
                  input: {pullRequestId: $pullRequestId, labelIds: $labelIds, milestoneId: $milestoneId}
                ) {
                  clientMutationId
                  # pullRequest {
                  #   labels(first: 100) {
                  #     nodes {
                  #       name
                  #     }
                  #   }
                  #   milestone {
                  #     title
                  #   }
                  # }
                }
              }
            `, {
              pullRequestId,
              labelIds,
              milestoneId
            })

            // Link the PR to the issue by ensuring PR body has proper closing keywords
            // This makes the link appear in the Development sidebar
            if (issueNumber) {
              const closingKeywords = ['close', 'closes', 'closed', 'fix', 'fixes', 'fixed', 'resolve', 'resolves', 'resolved'];
              const hasClosingKeyword = closingKeywords.some(keyword => {
                const pattern = new RegExp(`\\b${keyword}\\s*#${issueNumber}\\b`, 'i');
                return pattern.test(pullRequest.body || '');
              });

              if (!hasClosingKeyword) {
                core.info(`Adding closing keyword to link PR to issue #${issueNumber}`)
                const linkText = `\n\nFixes #${issueNumber}`;
                // Check if we already added this exact link
                if (!(pullRequest.body || '').includes(linkText.trim())) {
                  const newBody = (pullRequest.body || '') + linkText;
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    body: newBody
                  });
                }
              } else {
                core.info(`PR already has closing keyword for issue #${issueNumber}`)
              }
            }
