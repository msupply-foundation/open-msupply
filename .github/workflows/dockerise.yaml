name: Dockerise

on:
  push:
    tags:
      - "v*"

jobs:
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Install dependencies
        run: cd ./client && rm -rf node_modules && yarn install --frozen-lockfile

      - name: Build client
        run: NODE_OPTIONS="--max_old_space_size=4096" cd ./client && yarn build

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/packages/host/dist
          retention-days: 1

  build-server:
    name: Build server (${{ matrix.db }}, ${{ matrix.arch }})
    needs: build-client
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      matrix:
        db: [sqlite, postgres]
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Load client artifacts
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/packages/host/dist

      - name: Build server
        run: |
          RUST_IMAGE="rust:1.94-slim"
          CARGO_FLAGS=""
          if [ "${{ matrix.db }}" = "postgres" ]; then
            RUST_IMAGE="rust:1.94"
            CARGO_FLAGS="--no-default-features --features postgres --target-dir target-postgres"
          fi
          PLATFORM_FLAG=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            PLATFORM_FLAG="--platform linux/arm64"
          fi
          docker run --rm $PLATFORM_FLAG --user "$(id -u)":"$(id -g)" -v "$PWD":/usr/src/omsupply -w /usr/src/omsupply/server $RUST_IMAGE cargo build --release --bin remote_server --bin remote_server_cli $CARGO_FLAGS

      - name: Save server executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-executables-${{ matrix.db }}-${{ matrix.arch }}
          path: |
            server/target/release/remote_server
            server/target/release/remote_server_cli
            server/target-postgres/release/remote_server
            server/target-postgres/release/remote_server_cli
          retention-days: 1

  dockerise:
    name: Dockerise (${{ matrix.db }}, ${{ matrix.arch }})
    needs: [build-server]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        db: [sqlite, postgres]
        arch: [amd64, arm64]
    outputs:
      image_tag: ${{ env.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load server artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-executables-${{ matrix.db }}-${{ matrix.arch }}
          path: server/

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Version from Tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Set build variables
        id: vars
        run: |
          if [ "${{ matrix.db }}" = "sqlite" ]; then
            echo "target=sqlite" >> $GITHUB_OUTPUT
            echo "target_dev=dev" >> $GITHUB_OUTPUT
          else
            echo "target=postgres" >> $GITHUB_OUTPUT
            echo "target_dev=postgres-dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ steps.vars.outputs.target }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            msupplyfoundation/omsupply:${{ env.VERSION }}-${{ matrix.db }}-${{ matrix.arch }}

      - name: Build and Push Docker Image Dev
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ steps.vars.outputs.target_dev }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            msupplyfoundation/omsupply:${{ env.VERSION }}-${{ matrix.db }}-${{ matrix.arch }}-dev

  trigger-plugin-tests:
    name: Trigger Plugin Tests
    needs: dockerise
    uses: ./.github/workflows/trigger-plugin-tests.yaml
    with:
      image_tag: ${{ needs.dockerise.outputs.image_tag }}-dev
    secrets:
      ORG_WORKFLOW_TOKEN: ${{ secrets.ORG_WORKFLOW_TOKEN }}
