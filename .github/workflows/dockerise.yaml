name: Dockerise

on:
 push:
  tags:
   - 'v*'

jobs:
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Install dependencies
        run: cd ./client && rm -rf node_modules && yarn install --frozen-lockfile

      - name: Build client
        run: NODE_OPTIONS="--max_old_space_size=4096" cd ./client && yarn build

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/packages/host/dist
          retention-days: 1

  build-server:
    name: Build server (${{ matrix.arch }})
    needs: build-client
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: self-hosted
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load client artifacts
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/packages/host/dist

      - name: Apply async-dataloader patch
        run: |
          git apply docker/async-dataloader.patch

      - name: Build server
        run: docker run --rm --user "$(id -u)":"$(id -g)" -e RUSTUP_TOOLCHAIN=stable -v "$PWD":/usr/src/omsupply -w /usr/src/omsupply/server rust:slim cargo build --release --bin remote_server --bin remote_server_cli

      - name: Save server executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-executables-${{ matrix.arch }}
          path: |
            server/target/release/remote_server
            server/target/release/remote_server_cli
          retention-days: 1

  dockerise:
    name: Dockerise (${{ matrix.arch }})
    needs: build-server
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: self-hosted
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load server artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-executables-${{ matrix.arch }}
          path: server/target/release/

      - name: Extract Version from Tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Docker Image (base)
        run: docker build . -t msupplyfoundation/omsupply:${{ env.VERSION }}-${{ matrix.arch }} --target base

      - name: Build Docker Image (dev)
        run: docker build . -t msupplyfoundation/omsupply:${{ env.VERSION }}-dev-${{ matrix.arch }} --target dev

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Images
        run: |
          docker push msupplyfoundation/omsupply:${{ env.VERSION }}-${{ matrix.arch }}
          docker push msupplyfoundation/omsupply:${{ env.VERSION }}-dev-${{ matrix.arch }}

  create-manifest:
    name: Create Multi-Arch Manifest
    needs: dockerise
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image_tag: ${{ steps.tag.outputs.VERSION }}
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Version from Tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest (base)
        run: |
          docker buildx imagetools create \
            -t msupplyfoundation/omsupply:${{ steps.tag.outputs.VERSION }} \
            msupplyfoundation/omsupply:${{ steps.tag.outputs.VERSION }}-amd64 \
            msupplyfoundation/omsupply:${{ steps.tag.outputs.VERSION }}-arm64

      - name: Create and push multi-arch manifest (dev)
        run: |
          docker buildx imagetools create \
            -t msupplyfoundation/omsupply:${{ steps.tag.outputs.VERSION }}-dev \
            msupplyfoundation/omsupply:${{ steps.tag.outputs.VERSION }}-dev-amd64 \
            msupplyfoundation/omsupply:${{ steps.tag.outputs.VERSION }}-dev-arm64

  trigger-plugin-tests:
    name: Trigger Plugin Tests
    needs: create-manifest
    uses: ./.github/workflows/trigger-plugin-tests.yaml
    with:
      image_tag: ${{ needs.create-manifest.outputs.image_tag }}-dev
    secrets:
      ORG_WORKFLOW_TOKEN: ${{ secrets.ORG_WORKFLOW_TOKEN }}
