name: Sort JSON files

on:
  push:
    branches:
      - develop
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  sort:
    name: Sort JSON locale files
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Sort files
        run: |
          chmod +x .sort-json.sh 
          .sort-json.sh

      - name: Commit changes
        run: git commit --no-verify -m 'Sorted JSON files'
