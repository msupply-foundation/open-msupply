name: Client tests

on:
  pull_request:
    paths:
      - 'client/**'
  merge_group:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat ./client/.nvmrc)" >> "$GITHUB_OUTPUT"
        id: nvm

      - name: Use Node.js (.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version: '${{ steps.nvm.outputs.NVMRC }}'

      - name: Enable Corepack
        run: corepack enable

      - name: Install client dependencies
        run: cd ./client && yarn install --immutable

      - name: Install report/form dependencies
        run: |
          cd ./standard_reports && yarn install --frozen-lockfile
          cd ../standard_forms && yarn install --frozen-lockfile

      - name: Run tests
        run: cd ./client && yarn test
