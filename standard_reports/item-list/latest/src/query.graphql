query ItemList(
  $storeId: String!
  $itemCode: String
  $itemName: String
  $masterListId: String
  $isActive: Boolean
) {
  items(
    storeId: $storeId
    filter: {
      code: { like: $itemCode }
      name: { like: $itemName }
      isVisibleOrOnHand: true
      isActive: $isActive
      type: { equalTo: STOCK }
      masterListId: { equalTo: $masterListId }
    }
  ) {
    ... on ItemConnector {
      nodes {
        id
        code
        name
        venCategory
        stats: stats(storeId: $storeId) {
          stockOnHand
        }
        categories {
          name
        }
        itemStoreProperties: itemStoreProperties(storeId: $storeId) {
          defaultLocation {
            code
          }
        }
      }
    }
  }
}
