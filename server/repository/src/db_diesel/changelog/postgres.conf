
#------------------------------------------------------------------------------
# QUERY PERFORMANCE OPTIMIZATIONS
# Added: 2026-01-20
# Purpose: Optimize complex analytical queries with joins and aggregations
#------------------------------------------------------------------------------

# Memory Settings
work_mem = 2GB                        # Memory per sort/hash operation (default: 4MB)
                                         # Increased to prevent disk spills in large sorts
hash_mem_multiplier = 3.0               # Multiplier for hash table memory (default: 2.0)
                                         # Helps with memoize cache and large hash joins
maintenance_work_mem = 1GB              # Memory for maintenance operations (default: 64MB)

# Parallelism Settings
max_parallel_workers_per_gather = 4     # Max workers per query (default: 2)
max_parallel_workers = 8                # Total parallel workers (default: 8)
parallel_setup_cost = 50                # Cost of starting parallel workers (default: 1000)
                                         # Lower = more likely to use parallelism
parallel_tuple_cost = 0.005             # Cost per tuple in parallel mode (default: 0.1)
                                         # Lower = favors parallel execution

# Query Planner Settings
join_collapse_limit = 12                # Max FROM items to collapse (default: 8)
from_collapse_limit = 12                # Max explicit JOIN items to collapse (default: 8)
                                         # Increased for queries with many joins

# Cost-Based Settings (optimized for SSD)
seq_page_cost = 1.0                     # Sequential page fetch cost (default: 1.0)
random_page_cost = 1.1                  # Random page fetch cost (default: 4.0)
                                         # Lower value because SSDs have fast random access
effective_cache_size = 8GB              # Planner's estimate of OS cache (default: 4GB)
                                         # Should be ~50-75% of total RAM
#effective_io_concurrency = 200          # Concurrent I/O operations (default: 1)
                                         # Higher for SSDs

# Join Strategy Settings
enable_hashjoin = on                    # Enable hash joins (default: on)
enable_mergejoin = on                   # Enable merge joins (default: on)
enable_material = on                    # Enable materialization (default: on)
enable_memoize = on                     # Enable memoize nodes (default: on)

# JIT Compilation Settings
jit = on                                # Enable JIT compilation (default: on)
jit_above_cost = 100000                 # JIT for queries above this cost (default: 100000)
jit_optimize_above_cost = 500000        # JIT optimization threshold (default: 500000)

# Note: After changing these settings, restart PostgreSQL or run: SELECT pg_reload_conf();