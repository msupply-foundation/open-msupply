[test-groups]
# Sync integration tests share a single 4D mSupply server and several
# process-global statics; running them concurrently causes data contamination.
sync-integration = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'test(integration_sync)'
test-group = 'sync-integration'

[profile.ci]
test-threads = "num-cpus"
fail-fast = false

[profile.ci.slow-timeout]
period = "10s"

[profile.ci-sqlite]
inherits = "ci"

[[profile.ci-sqlite.overrides]]
filter = 'test(test_generate_excel_performance)'
threads-required = "num-cpus"

[profile.ci-sqlite.junit]
path = "sqlite-test-results.xml"
report-name = "Backend tests (SQLite)"

[profile.ci-postgres]
inherits = "ci"

[[profile.ci-postgres.overrides]]
filter = 'test(test_generate_excel_performance)'
threads-required = "num-cpus"

[profile.ci-postgres.junit]
path = "postgres-test-results.xml"
report-name = "Backend tests (Postgres)"
