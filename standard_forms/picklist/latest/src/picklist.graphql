query InvoiceQuery(
  $storeId: String!
  $dataId: String!
  $sort: PrintReportSortInput
) {
  invoice(storeId: $storeId, id: $dataId) {
    ... on InvoiceNode {
      id
      otherPartyId
      invoiceNumber
      createdDatetime
      otherPartyName
      otherParty(storeId: $storeId) {
        id
        code
        address1
        address2
      }
    }
    ... on NodeError {
      __typename
      error {
        description
      }
    }
  }
  invoiceLines(
    storeId: $storeId
    filter: { invoiceId: { equalTo: $dataId } }
    reportSort: $sort
  ) {
    ... on InvoiceLineConnector {
      nodes {
        id
        itemCode
        itemName
        item {
          unitName
        }
        packSize
        expiryDate
        batch
        numberOfPacks
        packSize
        location {
          code
        }
      }
    }
  }
  store(id: $storeId) {
    ... on StoreNode {
      storeName
      logo
      id
      name(storeId: $storeId) {
        address1
        address2
        email
        phone
      }
    }
  }
}